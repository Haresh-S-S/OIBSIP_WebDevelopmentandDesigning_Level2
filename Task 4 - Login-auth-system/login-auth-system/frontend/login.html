<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In · SecureAuth</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Ambient background orbs (decorative, purely visual) -->
  <div class="orb orb--one" aria-hidden="true"></div>
  <div class="orb orb--two" aria-hidden="true"></div>
  <div class="orb orb--three" aria-hidden="true"></div>

  <!-- Toast notification container -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <main class="auth-card" role="main">
    <div class="logo">
      <div class="logo__mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2L4 5v6c0 5.25 3.4 9.74 8 11 4.6-1.26 8-5.75 8-11V5l-8-3z" fill="white" fill-opacity="0.95"/>
        </svg>
      </div>
      <span class="logo__text">SecureAuth</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Log in to continue to your dashboard</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="identifier">Username or Email</label>
        <div class="input-wrapper">
          <input
            type="text"
            id="identifier"
            name="identifier"
            class="form-input"
            placeholder="Enter your username or email"
            autocomplete="username"
            aria-describedby="identifierError"
            aria-required="true"
          />
        </div>
        <span class="field-error" id="identifierError" role="alert"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            aria-describedby="passwordError"
            aria-required="true"
          />
          <button type="button" class="toggle-visibility" id="togglePassword" aria-label="Show password">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke="currentColor" stroke-width="1.6"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="passwordError" role="alert"></span>
      </div>

      <button type="submit" class="btn" id="loginBtn">
        <span class="spinner" aria-hidden="true"></span>
        <span class="btn__label">Log in</span>
      </button>
    </form>

    <p class="auth-link">
      Don't have an account? <a href="register.html">Register</a>
    </p>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
